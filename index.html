<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chigozie Prisca – Virtual Assistant Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF7F2;
    --sand: #F0EAE0;
    --warm-dark: #1C1A17;
    --bark: #3D2B1F;
    --amber: #C47D2B;
    --amber-light: #E8A84A;
    --sage: #5A7060;
    --sage-light: #7A9480;
    --terracotta: #B85C38;
    --blush: #E8CEB8;
    --text-muted: #7A7068;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--warm-dark); overflow-x: hidden; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 48px;
    background: rgba(250,247,242,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(196,125,43,0.15);
  }
  .nav-logo { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: var(--bark); }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { text-decoration: none; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); transition: color 0.2s; }
  .nav-links a:hover { color: var(--amber); }

  section { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 48px 80px; }

  /* HERO */
  .hero { background: var(--warm-dark); position: relative; overflow: hidden; align-items: stretch; padding: 0; }
  .hero-bg-circle { position: absolute; border-radius: 50%; pointer-events: none; }
  .hero-bg-circle-1 { width: 700px; height: 700px; background: radial-gradient(circle, rgba(196,125,43,0.16) 0%, transparent 70%); top: -150px; right: -100px; animation: floatCircle 8s ease-in-out infinite; }
  .hero-bg-circle-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(90,112,96,0.13) 0%, transparent 70%); bottom: -100px; left: -80px; animation: floatCircle 10s ease-in-out infinite reverse; }
  @keyframes floatCircle { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(20px,-20px); } }
  .hero-layout { display: grid; grid-template-columns: 1fr 440px; min-height: 100vh; width: 100%; position: relative; z-index: 2; }
  .hero-left { display: flex; flex-direction: column; justify-content: center; padding: 120px 60px 80px 80px; animation: fadeUp 0.9s ease both; }
  .hero-right { position: relative; overflow: hidden; }
  .hero-photo { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; filter: contrast(1.05); }
  .hero-photo-overlay { position: absolute; inset: 0; background: linear-gradient(to right, var(--warm-dark) 0%, transparent 25%), linear-gradient(to top, var(--warm-dark) 0%, transparent 15%); }
  .hero-photo-frame { position: absolute; inset: 0; border-left: 3px solid rgba(196,125,43,0.35); }
  .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(196,125,43,0.15); border: 1px solid rgba(196,125,43,0.3); color: var(--amber-light); font-size: 0.75rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 8px 18px; border-radius: 100px; margin-bottom: 28px; width: fit-content; }
  .hero-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber-light); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2.8rem, 5vw, 4.5rem); color: var(--cream); line-height: 1.05; margin-bottom: 12px; animation: fadeUp 0.9s 0.2s ease both; }
  .hero h1 em { font-style: italic; color: var(--amber-light); }
  .hero-subtitle { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sage-light); margin-bottom: 24px; animation: fadeUp 0.9s 0.3s ease both; line-height: 1.9; }
  .hero-subtitle span { color: rgba(255,255,255,0.3); margin: 0 8px; }
  .hero-desc { font-size: 1rem; line-height: 1.8; color: rgba(250,247,242,0.68); max-width: 500px; margin-bottom: 36px; animation: fadeUp 0.9s 0.4s ease both; }
  .hero-cta { display: inline-flex; align-items: center; gap: 10px; background: var(--amber); color: #fff; padding: 14px 32px; border-radius: 100px; text-decoration: none; font-weight: 600; font-size: 0.9rem; transition: all 0.25s; width: fit-content; }
  .hero-cta:hover { background: var(--amber-light); transform: translateY(-2px); box-shadow: 0 12px 30px rgba(196,125,43,0.35); }
  .hero-stats { display: flex; gap: 40px; margin-top: 48px; padding-top: 36px; border-top: 1px solid rgba(255,255,255,0.08); animation: fadeUp 0.9s 0.6s ease both; }
  .stat-item { text-align: left; }
  .stat-num { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--amber-light); }
  .stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.08em; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

  /* SHARED */
  .section-inner { max-width: 1100px; width: 100%; }
  .section-tag { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--amber); margin-bottom: 12px; }
  .section-title { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 4vw, 3rem); line-height: 1.15; color: var(--bark); margin-bottom: 16px; }
  .section-desc { font-size: 1rem; color: var(--text-muted); line-height: 1.7; max-width: 520px; margin-bottom: 48px; }

  /* SERVICES */
  .services { background: var(--cream); }
  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .service-card { background: #fff; border: 1px solid var(--sand); border-radius: 20px; padding: 30px 26px; transition: all 0.3s; position: relative; overflow: hidden; }
  .service-card::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--amber), var(--amber-light)); transform: scaleX(0); transform-origin: left; transition: transform 0.3s; }
  .service-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(28,26,23,0.1); }
  .service-card:hover::before { transform: scaleX(1); }
  .service-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; margin-bottom: 18px; }
  .service-card h3 { font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: var(--bark); margin-bottom: 12px; }
  .service-items { list-style: none; }
  .service-items li { font-size: 0.84rem; color: var(--text-muted); padding: 4px 0; display: flex; align-items: flex-start; gap: 8px; line-height: 1.5; }
  .service-items li::before { content: '→'; color: var(--amber); font-size: 0.72rem; margin-top: 3px; flex-shrink: 0; }

  /* TOOLS — tabbed by category */
  .tools { background: var(--sand); }
  .tools-tab-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
  .tools-tab-btn { padding: 8px 18px; border-radius: 100px; border: 1px solid rgba(196,125,43,0.25); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
  .tools-tab-btn.active, .tools-tab-btn:hover { background: var(--amber); border-color: var(--amber); color: #fff; }
  .tools-panel { display: none; animation: fadeIn 0.3s ease both; }
  .tools-panel.active { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .tool-card { background: #fff; border-radius: 14px; padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; border: 1px solid rgba(196,125,43,0.1); transition: all 0.25s; }
  .tool-card:hover { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(196,125,43,0.12); }
  .tool-icon { width: 46px; height: 46px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
  .tool-name { font-weight: 600; font-size: 0.84rem; color: var(--bark); }
  .tool-desc { font-size: 0.72rem; color: var(--text-muted); line-height: 1.45; }
  .tools-note { margin-top: 28px; display: flex; align-items: center; gap: 14px; background: rgba(196,125,43,0.08); border: 1px solid rgba(196,125,43,0.2); border-radius: 14px; padding: 18px 24px; }
  .tools-note-icon { font-size: 1.6rem; flex-shrink: 0; }
  .tools-note-text { font-size: 0.88rem; color: var(--bark); line-height: 1.6; }
  .tools-note-text strong { color: var(--amber); }

  /* WORK SAMPLES */
  .work { background: var(--cream); }
  .work-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 32px; }
  .tab-btn { padding: 9px 18px; border-radius: 100px; border: 1px solid var(--sand); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
  .tab-btn.active, .tab-btn:hover { background: var(--amber); border-color: var(--amber); color: #fff; }
  .dashboard-wrapper { display: none; animation: fadeIn 0.4s ease both; }
  .dashboard-wrapper.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  /* Calendar Dashboard */
  .cal-dash { background: #fff; border-radius: 20px; border: 1px solid var(--sand); overflow: hidden; box-shadow: 0 4px 24px rgba(28,26,23,0.06); }
  .cal-header { background: var(--bark); padding: 18px 28px; display: flex; align-items: center; justify-content: space-between; color: white; flex-wrap: wrap; gap: 12px; }
  .cal-header-left { display: flex; align-items: center; gap: 12px; }
  .cal-title { font-family: 'DM Serif Display', serif; font-size: 1.05rem; }
  .cal-week { font-size: 0.78rem; opacity: 0.6; margin-top: 3px; }
  .cal-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cal-stats { display: flex; gap: 20px; }
  .cal-stat-n { font-size: 1.2rem; font-weight: 600; color: var(--amber-light); }
  .cal-stat-l { font-size: 0.62rem; opacity: 0.6; text-transform: uppercase; }
  .cal-grid { display: grid; grid-template-columns: 88px repeat(5, 1fr); font-size: 0.78rem; }
  .cal-col-header { padding: 12px 8px; text-align: center; font-weight: 600; font-size: 0.7rem; letter-spacing: 0.06em; text-transform: uppercase; background: var(--sand); color: var(--text-muted); border-bottom: 1px solid var(--sand); }
  .cal-time { padding: 9px 10px; font-size: 0.68rem; color: var(--text-muted); border-right: 1px solid var(--sand); border-bottom: 1px solid rgba(0,0,0,0.04); background: #fafafa; text-align: right; white-space: nowrap; }
  .cal-cell { border-right: 1px solid rgba(0,0,0,0.04); border-bottom: 1px solid rgba(0,0,0,0.04); padding: 3px; min-height: 40px; }
  .cal-event { border-radius: 5px; padding: 4px 7px; font-size: 0.68rem; font-weight: 500; line-height: 1.3; height: 100%; min-height: 30px; display: flex; flex-direction: column; justify-content: center; }
  .cal-event small { font-size: 0.62rem; opacity: 0.75; }
  .cal-event.amber { background: rgba(196,125,43,0.15); color: #8B5A1A; border-left: 3px solid var(--amber); }
  .cal-event.sage { background: rgba(90,112,96,0.15); color: #3D5E45; border-left: 3px solid var(--sage); }
  .cal-event.terra { background: rgba(184,92,56,0.15); color: #8B3A1F; border-left: 3px solid var(--terracotta); }
  .cal-event.blush { background: rgba(232,200,184,0.6); color: #7A4A3A; border-left: 3px solid var(--blush); }

  /* Email Dashboard */
  .email-dash { background: #fff; border-radius: 20px; border: 1px solid var(--sand); overflow: hidden; box-shadow: 0 4px 24px rgba(28,26,23,0.06); display: grid; grid-template-columns: 220px 1fr; }
  .email-sidebar { background: var(--warm-dark); padding: 22px 14px; color: white; }
  .email-sidebar h4 { font-family: 'DM Serif Display', serif; font-size: 1rem; margin-bottom: 18px; opacity: 0.9; }
  .email-folder { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border-radius: 8px; margin-bottom: 3px; font-size: 0.8rem; transition: background 0.2s; cursor: pointer; }
  .email-folder.active { background: rgba(196,125,43,0.25); }
  .email-folder:hover { background: rgba(255,255,255,0.07); }
  .email-folder-left { display: flex; align-items: center; gap: 8px; }
  .email-badge { background: var(--amber); color: white; font-size: 0.62rem; font-weight: 700; padding: 2px 6px; border-radius: 100px; }
  .email-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--sand); background: #fafafa; flex-wrap: wrap; gap: 8px; }
  .email-toolbar-title { font-weight: 600; font-size: 0.88rem; color: var(--bark); }
  .email-filter-tags { display: flex; gap: 5px; }
  .etag { padding: 3px 10px; border-radius: 100px; font-size: 0.7rem; font-weight: 500; }
  .etag-urgent { background: rgba(184,92,56,0.15); color: var(--terracotta); }
  .etag-followup { background: rgba(196,125,43,0.15); color: var(--amber); }
  .etag-info { background: rgba(90,112,96,0.15); color: var(--sage); }
  .email-row { display: grid; grid-template-columns: 34px 1fr 100px 85px; align-items: center; padding: 12px 18px; border-bottom: 1px solid rgba(0,0,0,0.04); gap: 10px; cursor: pointer; transition: background 0.15s; }
  .email-row:hover { background: var(--sand); }
  .email-row.unread { background: rgba(196,125,43,0.04); }
  .email-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; color: white; }
  .email-sender { font-size: 0.8rem; font-weight: 600; color: var(--bark); }
  .email-subject { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
  .email-time { font-size: 0.7rem; color: var(--text-muted); text-align: right; }
  .priority-chip { padding: 3px 9px; border-radius: 100px; font-size: 0.66rem; font-weight: 600; text-align: center; white-space: nowrap; }
  .p-urgent { background: rgba(184,92,56,0.15); color: var(--terracotta); }
  .p-followup { background: rgba(196,125,43,0.15); color: var(--amber); }
  .p-done { background: rgba(90,112,96,0.15); color: var(--sage); }

  /* Ticket Dashboard */
  .ticket-dash { background: #fff; border-radius: 20px; border: 1px solid var(--sand); overflow: hidden; box-shadow: 0 4px 24px rgba(28,26,23,0.06); }
  .ticket-header { background: var(--bark); padding: 18px 26px; color: white; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
  .ticket-header-title { font-family: 'DM Serif Display', serif; font-size: 1.05rem; }
  .ticket-kpis { display: flex; gap: 20px; }
  .tkpi { text-align: center; }
  .tkpi-n { font-size: 1.3rem; font-weight: 700; color: var(--amber-light); }
  .tkpi-l { font-size: 0.62rem; opacity: 0.6; text-transform: uppercase; }
  .ticket-cols { display: grid; grid-template-columns: repeat(3, 1fr); }
  .ticket-col { border-right: 1px solid var(--sand); min-height: 340px; }
  .ticket-col:last-child { border-right: none; }
  .ticket-col-title { padding: 12px 14px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; border-bottom: 2px solid; display: flex; align-items: center; justify-content: space-between; }
  .tc-open { color: var(--terracotta); border-color: var(--terracotta); background: rgba(184,92,56,0.06); }
  .tc-progress { color: var(--amber); border-color: var(--amber); background: rgba(196,125,43,0.06); }
  .tc-resolved { color: var(--sage); border-color: var(--sage); background: rgba(90,112,96,0.06); }
  .tc-count { width: 20px; height: 20px; border-radius: 50%; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; color: white; }
  .tc-count.open { background: var(--terracotta); }
  .tc-count.prog { background: var(--amber); }
  .tc-count.res { background: var(--sage); }
  .ticket-cards { padding: 10px; }
  .tcard { background: var(--sand); border-radius: 9px; padding: 10px 12px; margin-bottom: 8px; border-left: 3px solid transparent; }
  .tcard-id { font-size: 0.63rem; color: var(--text-muted); margin-bottom: 4px; }
  .tcard-title { font-size: 0.78rem; font-weight: 600; color: var(--bark); margin-bottom: 6px; line-height: 1.4; }
  .tcard-meta { display: flex; align-items: center; justify-content: space-between; }
  .tcard-tag { font-size: 0.63rem; font-weight: 600; padding: 2px 7px; border-radius: 100px; }
  .tcard-time { font-size: 0.63rem; color: var(--text-muted); }
  .tag-billing { background: rgba(184,92,56,0.12); color: var(--terracotta); }
  .tag-tech { background: rgba(90,112,96,0.12); color: var(--sage); }
  .tag-shipping { background: rgba(196,125,43,0.12); color: var(--amber); }
  .tag-refund { background: rgba(90,112,96,0.12); color: var(--sage); }

  /* Tenant Dashboard */
  .tenant-dash { background: #fff; border-radius: 20px; border: 1px solid var(--sand); overflow: hidden; box-shadow: 0 4px 24px rgba(28,26,23,0.06); }
  .tenant-header { background: var(--sage); padding: 18px 26px; color: white; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px; }
  .tenant-header-title { font-family: 'DM Serif Display', serif; font-size: 1.05rem; }
  .tenant-kpis { display: flex; gap: 20px; }
  .ten-kpi { text-align: center; }
  .ten-kpi-n { font-size: 1.3rem; font-weight: 700; color: #d4edda; }
  .ten-kpi-l { font-size: 0.62rem; opacity: 0.75; text-transform: uppercase; }
  .tenant-table-wrap { overflow-x: auto; }
  .tenant-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  .tenant-table th { padding: 11px 14px; text-align: left; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); background: #fafafa; border-bottom: 1px solid var(--sand); white-space: nowrap; }
  .tenant-table td { padding: 11px 14px; border-bottom: 1px solid rgba(0,0,0,0.04); color: var(--bark); }
  .tenant-table tr:hover td { background: var(--sand); }
  .status-chip { padding: 3px 9px; border-radius: 100px; font-size: 0.68rem; font-weight: 600; white-space: nowrap; }
  .s-new { background: rgba(184,92,56,0.12); color: var(--terracotta); }
  .s-prog { background: rgba(196,125,43,0.12); color: var(--amber); }
  .s-sched { background: rgba(90,112,96,0.12); color: var(--sage); }
  .s-done { background: rgba(28,160,80,0.1); color: #1A8040; }
  .priority-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }

  /* WHY ME */
  .whyme { background: var(--warm-dark); }
  .whyme .section-title { color: var(--cream); }
  .whyme .section-desc { color: rgba(255,255,255,0.5); }
  .qualities-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .quality-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 26px 22px; transition: all 0.3s; }
  .quality-card:hover { background: rgba(196,125,43,0.1); border-color: rgba(196,125,43,0.3); transform: translateY(-3px); }
  .quality-icon { font-size: 1.7rem; margin-bottom: 14px; }
  .quality-title { font-family: 'DM Serif Display', serif; font-size: 1.05rem; color: var(--cream); margin-bottom: 8px; }
  .quality-desc { font-size: 0.83rem; color: rgba(255,255,255,0.5); line-height: 1.6; }
  .quote-block { margin-top: 44px; background: rgba(196,125,43,0.1); border: 1px solid rgba(196,125,43,0.2); border-radius: 14px; padding: 26px 30px; display: flex; align-items: center; gap: 18px; }
  .quote-icon { font-size: 2.2rem; opacity: 0.6; flex-shrink: 0; }
  .quote-text { font-family: 'DM Serif Display', serif; font-size: 1.15rem; font-style: italic; color: var(
